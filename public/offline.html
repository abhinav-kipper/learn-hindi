<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Bolna Seekho</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #fff3cf 0%, #ebe2f6 100%);
        color: #36281e;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        background: #fff;
        border: 2.5px solid #36281e;
        border-radius: 28px;
        box-shadow: 4px 4px 0 #36281e;
        padding: 32px 26px;
        max-width: 360px;
        width: 100%;
      }
      .cup { font-size: 64px; line-height: 1; margin-bottom: 12px; }
      h1 {
        font-size: 24px;
        font-weight: 800;
        color: #f97316;
        margin-bottom: 10px;
        line-height: 1.15;
      }
      p {
        font-size: 15px;
        line-height: 1.55;
        color: #6b5d52;
        margin-bottom: 8px;
      }
      .hint {
        font-size: 13px;
        color: #8a7d72;
        margin-top: 14px;
        margin-bottom: 20px;
      }
      button {
        width: 100%;
        padding: 13px;
        border-radius: 18px;
        background: #f97316;
        color: #fff;
        border: 2.5px solid #36281e;
        box-shadow: 3px 3px 0 #36281e;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
      }
      button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #36281e; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="cup">☕</div>
      <h1>You're offline</h1>
      <p>No internet right now. Lessons, vocabulary, stories and quizzes you've opened before still work offline.</p>
      <p class="hint">Live AI chat and pronunciation coaching need a connection — they'll come back when you're online.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
