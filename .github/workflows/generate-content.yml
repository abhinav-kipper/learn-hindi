# Weekly content cron — fires Monday 09:00 UTC and on manual dispatch.
# Pops the next topic from content/lesson-queue.json, asks Gemini to
# generate a situational lesson + themed vocab batch, validates the
# output against the schema, writes the files + patches lib/lessons.ts,
# and opens a PR for review.
#
# On any failure (queue empty, generation error, schema fail, queue dupe
# or tsc breaks), opens a GitHub Issue with the error in the body instead
# of creating a PR.
#
# Required secrets:
#   GOOGLE_GENERATIVE_AI_API_KEY — Gemini key
#   (GITHUB_TOKEN is auto-provided)

name: generate-content

on:
  schedule:
    # Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional topic id to override the queue (e.g. "doctor-visit")'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate content
        id: gen
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            node scripts/generate-lesson.mjs --topic=${{ github.event.inputs.topic }} 2> /tmp/gen-error.log
          else
            node scripts/generate-lesson.mjs 2> /tmp/gen-error.log
          fi

      - name: Verify build (tsc)
        run: npx tsc --noEmit

      - name: Read generation manifest
        id: manifest
        run: |
          {
            echo 'manifest<<EOF'
            cat .generated-content.json
            echo
            echo EOF
          } >> "$GITHUB_OUTPUT"
          jq -r '.topicId' .generated-content.json > /tmp/topic-id
          jq -r '.title' .generated-content.json > /tmp/title
          jq -r '.slug' .generated-content.json > /tmp/slug
          jq -r '.vocabCategory' .generated-content.json > /tmp/vocab-cat
          jq -r '.vocabCount' .generated-content.json > /tmp/vocab-count
          jq -r '.phraseCount' .generated-content.json > /tmp/phrase-count

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOPIC_ID=$(cat /tmp/topic-id)
          TITLE=$(cat /tmp/title)
          SLUG=$(cat /tmp/slug)
          VOCAB_CAT=$(cat /tmp/vocab-cat)
          VOCAB_COUNT=$(cat /tmp/vocab-count)
          PHRASE_COUNT=$(cat /tmp/phrase-count)
          BRANCH="auto/lesson-${SLUG}"

          # Discard the manifest file (only meant for CI handoff)
          rm -f .generated-content.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add content/lessons content/vocabulary.json content/lesson-queue.json lib/lessons.ts
          git commit -m "📚 Lesson ${SLUG}: ${TITLE} (auto-generated)" -m "$PHRASE_COUNT phrases + $VOCAB_COUNT new vocab words under category '$VOCAB_CAT'. Generated by .github/workflows/generate-content.yml from queue topic '$TOPIC_ID'. Review before merging."
          git push origin "$BRANCH"

          gh pr create \
            --title "📚 Lesson: ${TITLE}" \
            --body "$(cat <<EOF
          **Auto-generated from queue topic** \`${TOPIC_ID}\`.

          - **Lesson:** \`content/lessons/${SLUG}.json\` (${PHRASE_COUNT} phrases)
          - **Vocab:** ${VOCAB_COUNT} new words appended to \`${VOCAB_CAT}\` category
          - **Patched:** \`lib/lessons.ts\` import + array entry
          - **Queue:** topic removed from \`content/lesson-queue.json\`

          ## Review checklist
          - [ ] Phrases sound natural / colloquial (not textbook)
          - [ ] Pronoun register correct (tu/tum/aap)
          - [ ] Gender agreement in examples is right
          - [ ] Romanization follows CAPS-stress style (e.g. \`a-REY\` not \`a-rey\`)
          - [ ] No duplicate phrases from existing lessons
          - [ ] Vocab words thematically fit
          - [ ] No Devanagari script smuggled in
          EOF
          )"

      - name: Open issue on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          ERR=$(cat /tmp/gen-error.log 2>/dev/null || echo "(no error log captured)")
          gh issue create \
            --title "⚠️ Content generation failed — week of ${DATE}" \
            --label "content-generation" \
            --body "$(cat <<EOF
          The weekly content cron failed.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          **Error:**
          \`\`\`
          ${ERR}
          \`\`\`

          Common causes:
          - \`QUEUE_EMPTY\` — add more topics to \`content/lesson-queue.json\`.
          - \`LESSON_GENERATION_FAILED\` or \`VOCAB_GENERATION_FAILED\` — Gemini didn't return valid JSON. Try re-running the workflow; if it persists, tighten the schema or prompt.
          - \`DUPLICATE_ID\` — the queue topic id already exists in \`content/lessons/\`. Rename or remove.
          - tsc failure after generation — \`lib/lessons.ts\` patch broke compile. Inspect the branch (if pushed) or re-run.
          EOF
          )"
