# Visual regression — runs Playwright on every PR + push to main.
# Uploads diff artifacts on failure for review.
#
# NON-BLOCKING for now: baseline screenshots were never committed, and the
# /practice route can't render in CI (no GOOGLE_GENERATIVE_AI_API_KEY → 500).
# `continue-on-error` keeps this informational so it doesn't false-fail the
# pipeline. To make it a real gate: seed baselines ON the runner (one-off
# `--update-snapshots` + commit), drop/guard the practice screenshot, then
# remove continue-on-error. ci.yml (tsc + vitest + lint) is the hard gate.

name: visual

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run visual tests
        continue-on-error: true
        run: pnpm exec playwright test --config e2e/playwright.config.ts

      - name: Upload diff artifacts on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: |
            e2e/visual.spec.ts-snapshots/
            test-results/
            playwright-report/
