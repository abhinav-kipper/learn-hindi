# Bolna Seekho CI — runs lint, type-check, and the vitest suite on every
# push to main and on every PR. Sets a red ❌ on the commit if anything
# fails, so a broken build is visible before / alongside the Vercel deploy
# that's also triggered by the push.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: npx eslint .

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run
